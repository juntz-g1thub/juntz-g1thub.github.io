name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build site
        run: npm run build
        
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
      - name: Force push built site to main
        run: |
          # 创建一个临时目录存放构建文件
          mkdir -p ~/temp-deploy
          cp -r _site/* ~/temp-deploy/
          
          # 添加所有文件并提交
          cd ~/temp-deploy
          git init
          git add -A
          git commit -m "Deploy built site $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送到用户的仓库，替换整个main分支
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/juntz-g1thub/juntz-g1thub.github.io.git
          git branch -M main
          git push -f origin main