name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Check repository
        run: |
          echo "📦 Zero-build blog detected"
          echo "🔄 No build step needed"
          echo "🚀 Files will be served directly by GitHub Pages"
          echo ""
          echo "Manual deployment steps:"
          echo "1. Push to main branch"
          echo "2. Files are automatically available at https://juntz-g1thub.github.io"
          echo "3. No build process - direct file serving"
          
      - name: Verify file structure
        run: |
          echo "📁 Essential files for zero-build blog:"
          echo "- ✅ index.html (main application)"
          echo "- ✅ blog.js (core logic)"
          echo "- ✅ style.css (styling)"
          echo "- ✅ posts/ (markdown content)"
          echo "- ✅ 404.html (SPA fallback)"
          echo "- ✅ .nojekyll (disable Jekyll processing)"